// ── SUPABASE ──────────────────────────────────────────────────────────────────
async function db(path, opts={}) {
  try {
    const res = await fetch(SUPABASE_URL+"/rest/v1/"+path, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer "+SUPABASE_KEY,
        "Content-Type": "application/json",
        "Prefer": opts.prefer||"return=representation",
      },
      method: opts.method||"GET",
      body: opts.body ? JSON.stringify(opts.body) : undefined,
    });
    if(!res.ok){ console.error("DB error", res.status, await res.text()); return null; }
    const ct = res.headers.get("content-type")||"";
    return ct.includes("json") ? res.json() : null;
  } catch(e) { console.error("DB fetch error", e); return null; }
}

async function loadMembers() {
  const rows = await db("members?select=*&order=name") || [];
  return rows.map(r=>({id:r.id,name:r.name,idNum:r.id_num,team:r.team,joined:r.joined,lastSeen:r.last_seen,lastEntry:r.last_entry}));
}
async function saveMember(m) {
  return db("members?on_conflict=id", {method:"POST",prefer:"resolution=merge-duplicates",body:{id:m.id,name:m.name,id_num:m.idNum,team:m.team,joined:m.joined,last_seen:m.lastSeen,last_entry:m.lastEntry}});
}
async function loadEntries(memberId) {
  const rows = await db(`entries?member_id=eq.${memberId}&order=date`) || [];
  return rows.map(r=>({date:r.date,week:r.week,rozmowy:r.rozmowy||0,zaproszenia:r.zaproszenia||0,spotkania:r.spotkania||0,partnerzy:r.partnerzy||0,followup:r.followup||0,sety:r.sety||0}));
}
async function saveEntry(memberId, e) {
  return db("entries?on_conflict=member_id,date", {method:"POST",prefer:"resolution=merge-duplicates",body:{member_id:memberId,date:e.date,week:e.week,rozmowy:e.rozmowy||0,zaproszenia:e.zaproszenia||0,spotkania:e.spotkania||0,partnerzy:e.partnerzy||0,followup:e.followup||0,sety:e.sety||0}});
}
async function loadAllEntries() {
  const rows = await db("entries?select=*&order=date") || [];
  const map = {};
  for(const r of rows){ if(!map[r.member_id])map[r.member_id]=[]; map[r.member_id].push({date:r.date,week:r.week,rozmowy:r.rozmowy||0,zaproszenia:r.zaproszenia||0,spotkania:r.spotkania||0,partnerzy:r.partnerzy||0,followup:r.followup||0,sety:r.sety||0}); }
  return map;
}

async function getAICoaching({memberName,todayData,history,isAdmin,teamData}) {

  const prompt=isAdmin
    ?`Jestes ekspertem menedzmentu sprzedazy i budowania zespolow w biznesie sieciowym (branzy longevity). Analizujesz dane zespolu i dajesz liderowi konkretne wskazowki. Jezyk: polski, bezposredni.\n\nDANE ZESPOLU:\n- Czlonkow: ${teamData.total}, Aktywnych: ${teamData.active}\n- Rozmowy: ${teamData.rozmowy}, Zaproszenia: ${teamData.zaproszenia}, Spotkania: ${teamData.spotkania}\n- Nowi partnerzy: ${teamData.partnerzy}, Follow-upy: ${teamData.followup}, Sety: ${teamData.sety}\nCZLONKOWIE: ${teamData.members.map(m=>`${m.name}: ${m.active?"AKTYWNY":"BRAK"}, rozmowy:${m.rozmowy||0}`).join("; ")}\n\nOdpowiedz TYLKO JSON bez backtickow: {"ocena":"...","priorytet":"...","wskazowki":["...","...","..."],"czerwona_flaga":"... lub null","motywacja":"..."}`
    :`Jestes osobistym coachem sprzedazy (branzy longevity). Mow bezposrednio do osoby (per Ty). Jezyk: polski, szczery.\n\nOSOBA: ${memberName}\nDZIS: rozmowy=${todayData.rozmowy}, zaproszenia=${todayData.zaproszenia}, spotkania=${todayData.spotkania}, partnerzy=${todayData.partnerzy}, followup=${todayData.followup}, sety=${todayData.sety}\nKONWERSJE: R→Z=${c1}%, Z→S=${c2}%, S→P=${c3}%\nSREDNIA 7 DNI: rozmowy/d=${avg("rozmowy")}, zaproszenia/d=${avg("zaproszenia")}, spotkania/d=${avg("spotkania")}\n\nOdpowiedz TYLKO JSON bez backtickow: {"ocena_dnia":"...","mocna_strona":"...","obszar_do_poprawy":"...","zadanie_na_jutro":"...","wskazowka_techniczna":"...","motywacja":"..."}`;
  try {
    const res=await fetch(WORKER_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:1000,messages:[{role:"user",content:prompt}]})});
    const data=await res.json();
    const text=data.content?.find(b=>b.type==="text")?.text||"{}";
    return JSON.parse(text.replace(/```json|```/g,"").trim());
  } catch(e) { console.error("AI error",e); return null; }
}

function MemberView({memberId,memberName,memberTeam,memberIdNum,memberJoined,onBack}){

  const [todayData,setTodayData]=useState(()=>Object.fromEntries(METRICS.map(m=>[m.id,0])));
  const [history,setHistory]=useState([]);

  const [loading,setLoading]=useState(true);

  useEffect(()=>{(async()=>{
    const hist=await loadEntries(memberId);
    setHistory(hist);
    const td=hist.find(e=>e.date===today());
    if(td)setTodayData(td);
    setLoading(false);
  })();},[memberId]);

  const handleSave=async()=>{
    const entry={...todayData,date:today(),week:weekKey()};
    const newHist=[...history.filter(e=>e.date!==today()),entry];
    setHistory(newHist);
    await saveEntry(memberId,entry);
    await saveMember({id:memberId,name:memberName,idNum:memberIdNum,team:memberTeam,joined:memberJoined||today(),lastSeen:today(),lastEntry:entry});
    setSaved(true);setTimeout(()=>setSaved(false),2500);

  const weekEntries=history.filter(e=>e.week===weekKey());
  const weekTotals=METRICS.reduce((acc,m)=>{acc[m.id]=weekEntries.reduce((s,e)=>s+(e[m.id]||0),0);return acc;},{});

          <div style={{fontSize:11,color:"#555",marginBottom:12,textAlign:"center"}}>Biezacy tydzien — {weekEntries.length} aktywnych dni</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>{METRICS.map(m=>(<StatCard key={m.id} label={m.label} icon={m.icon} color={m.color} value={weekTotals[m.id]||0}/>))}</div>
          {weekTotals.rozmowy>0&&<div style={{background:"#12122a",border:"1px solid #222",borderRadius:12,padding:13,marginBottom:14}}><ConvBar label="Rozmowa → Zaproszenie" value={pct(weekTotals.zaproszenia,weekTotals.rozmowy)} color="#3B9EE8"/><ConvBar label="Zaproszenie → Spotkanie" value={pct(weekTotals.spotkania,weekTotals.zaproszenia)} color="#7B4FE8"/><ConvBar label="Spotkanie → Partner/Klient" value={pct(weekTotals.partnerzy,weekTotals.spotkania)} color="#27AE60"/></div>}
          {weekEntries.sort((a,b)=>a.date.localeCompare(b.date)).map(e=>(<div key={e.date} style={{background:"#12122a",border:"1px solid #222",borderRadius:10,padding:"10px 13px",marginBottom:7,display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontSize:12,color:"#888"}}>{new Date(e.date+"T12:00:00").toLocaleDateString("pl-PL",{weekday:"short",day:"numeric",month:"short"})}</div><div style={{display:"flex",gap:8}}>{METRICS.map(m=>(<div key={m.id} style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:700,color:m.color}}>{e[m.id]||0}</div><div style={{fontSize:8,color:"#555"}}>{m.icon}</div></div>))}</div></div>))}
        </>}
        {tab==="history"&&<>
          <div style={{fontSize:11,color:"#555",marginBottom:12,textAlign:"center"}}>Historia — {history.length} dni</div>
          {history.length===0?<div style={{textAlign:"center",color:"#555",padding:40}}>Brak historii jeszcze</div>
          :[...history].sort((a,b)=>b.date.localeCompare(a.date)).map(e=>(<div key={e.date} style={{background:"#12122a",border:"1px solid #222",borderRadius:12,padding:"13px",marginBottom:9}}><div style={{fontSize:11,color:"#FFB700",fontWeight:700,marginBottom:9}}>{new Date(e.date+"T12:00:00").toLocaleDateString("pl-PL",{weekday:"long",day:"numeric",month:"long"})}</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7}}>{METRICS.map(m=>(<div key={m.id} style={{textAlign:"center"}}><div style={{fontSize:17,fontWeight:800,color:m.color}}>{e[m.id]||0}</div><div style={{fontSize:9,color:"#555"}}>{m.label}</div></div>))}</div></div>))}
        </>}
      </div>
    </div>
  );
}

function RankingRow({r,i,period}){
  const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
  const sc=r.score>=(period==="monthly"?200:50)?"#27AE60":r.score>=(period==="monthly"?80:20)?"#FFB700":"#888";
  return(<div style={{background:"#12122a",border:"1px solid #1a1a2e",borderRadius:10,padding:"10px 13px",marginBottom:6}}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
      <div style={{fontSize:18,minWidth:24,textAlign:"center"}}>{medal||<span style={{fontSize:12,color:"#444"}}>#{i+1}</span>}</div>
      <div style={{flex:1}}><div style={{fontWeight:700,fontSize:13}}>{r.name}</div><div style={{fontSize:10,color:"#555"}}>{r.team||"—"} · ID:{r.idNum} · {r.activeDays}d aktywnych</div></div>
      <div style={{textAlign:"right"}}><div style={{fontSize:15,fontWeight:800,color:sc}}>{r.score}</div><div style={{fontSize:9,color:"#555"}}>pkt</div></div>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4}}>{METRICS.map(m=>(<div key={m.id} style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:700,color:m.color}}>{r[m.id]||0}</div><div style={{fontSize:8,color:"#444"}}>{m.icon}</div></div>))}</div>
  </div>);
}

function TeamRankRow({t,i,color,barMax}){
  const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":"";
  return(<div style={{background:"#12122a",border:"1px solid #222",borderRadius:11,padding:"12px 14px",marginBottom:8}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div><span style={{fontSize:16,marginRight:6}}>{medal||`#${i+1}`}</span><span style={{fontWeight:700,fontSize:13}}>{t.name}</span><span style={{marginLeft:8,fontSize:10,color:"#555"}}>{t.members} osob</span></div>
      <div style={{fontSize:16,fontWeight:800,color}}>{t.score} pkt</div>
    </div>
    <div style={{background:"#0d0d1a",borderRadius:4,height:5,marginBottom:8,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round(t.score/Math.max(barMax||1,1)*100)}%`,background:`linear-gradient(90deg,${color},${color}88)`,borderRadius:4}}/></div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4}}>{METRICS.map(m=>(<div key={m.id} style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:700,color:m.color}}>{t[m.id]||0}</div><div style={{fontSize:8,color:"#444"}}>{m.icon}</div></div>))}</div>
  </div>);
}

// ── ADMIN VIEW ────────────────────────────────────────────────────────────────
function AdminView({onBack}){
  const [members,setMembers]=useState([]);
  const [selected,setSelected]=useState(null);
  const [memberHistory,setMemberHistory]=useState([]);
  const [allHistories,setAllHistories]=useState({});
  const [tab,setTab]=useState("overview");
  const [selectedTeam,setSelectedTeam]=useState(null);
  const [loading,setLoading]=useState(true);
  const [histLoading,setHistLoading]=useState(false);
  const [histLoaded,setHistLoaded]=useState(false);

  useEffect(()=>{(async()=>{const m=await loadMembers();setMembers(m);setLoading(false);})();},[]);

  const loadAllHist=async()=>{
    if(histLoaded)return;
    setHistLoading(true);
    const h=await loadAllEntries();
    setAllHistories(h);setHistLoaded(true);setHistLoading(false);
  };

  const handleTab=t=>{setTab(t);if(t==="weekly"||t==="monthly")loadAllHist();};
  const selectMember=async m=>{setSelected(m);setMemberHistory(await loadEntries(m.id));setTab("member");};
  const openTeam=t=>{setSelectedTeam(t);setTab("teamdetail");};

  const activeToday=members.filter(m=>m.lastSeen===today());
  const teamToday=METRICS.reduce((acc,m)=>{acc[m.id]=activeToday.reduce((s,mem)=>s+(mem.lastEntry?.[m.id]||0),0);return acc;},{});
  const teamData={total:members.length,active:activeToday.length,...teamToday,members:members.map(m=>({name:m.name,active:m.lastSeen===today(),rozmowy:m.lastEntry?.rozmowy||0}))};

  const computeStats=mList=>{const a=mList.filter(m=>m.lastSeen===today());const t=METRICS.reduce((acc,m)=>{acc[m.id]=a.reduce((s,mem)=>s+(mem.lastEntry?.[m.id]||0),0);return acc;},{});return{active:a.length,total:mList.length,...t};};
  const computePeriodStats=(mList,filterFn)=>mList.map(m=>{
    const hist=allHistories[m.id]||[];
    const entries=hist.filter(filterFn);
    const totals=METRICS.reduce((acc,mt)=>{acc[mt.id]=entries.reduce((s,e)=>s+(e[mt.id]||0),0);return acc;},{});
    const activeDays=entries.length;
    const score=(totals.rozmowy||0)+(totals.zaproszenia||0)*2+(totals.spotkania||0)*3+(totals.partnerzy||0)*10+(totals.sety||0)*5;
    return{...m,...totals,activeDays,score};
  }).sort((a,b)=>b.score-a.score);

  if(loading)return <Spinner/>;
  const backLabel=tab==="member"?"← Profil":tab==="teamdetail"?"← Podzesp.":"← Wyjdz";
  const backAction=tab==="member"?()=>setTab("overview"):tab==="teamdetail"?()=>setTab("teams"):onBack;

  const periodSection=(label,color,period,filterFn)=>{
    if(histLoading)return <Spinner full={false}/>;
    if(!histLoaded)return <div style={{textAlign:"center",color:"#555",padding:40}}>Ladowanie...</div>;
    const rows=computePeriodStats(members,filterFn);
    const totals=METRICS.reduce((acc,m)=>{acc[m.id]=rows.reduce((s,r)=>s+(r[m.id]||0),0);return acc;},{});
    const active=rows.filter(r=>r.activeDays>0).length;
    const teamRows=TEAMS.map(tn=>{const tm=rows.filter(r=>r.team===tn);const t=METRICS.reduce((acc,m)=>{acc[m.id]=tm.reduce((s,r)=>s+(r[m.id]||0),0);return acc;},{});return{name:tn,members:tm.length,score:tm.reduce((s,r)=>s+r.score,0),...t};}).filter(t=>t.members>0).sort((a,b)=>b.score-a.score);
    const isMonth=period==="monthly";
    return(<>
      <div style={{background:isMonth?"linear-gradient(135deg,#1a1422,#1a1a3a)":"linear-gradient(135deg,#16162e,#1a1a3a)",border:`1px solid ${isMonth?"#7B4FE833":"#FFB70033"}`,borderRadius:12,padding:"14px 16px",marginBottom:14,textAlign:"center"}}>
        <div style={{fontSize:11,color:isMonth?"#a78bfa":"#FFB700",letterSpacing:2,marginBottom:4}}>{isMonth?"RAPORT MIESIĘCZNY":"RAPORT TYGODNIOWY"}</div>
        <div style={{fontSize:22,fontWeight:800,color:"#fff"}}>{isMonth?monthLbl():`Tydzien ${weekKey().split("-W")[1]} · ${new Date().getFullYear()}`}</div>
        <div style={{fontSize:11,color:"#555",marginTop:4}}>{active} z {members.length} osob aktywnych</div>
      </div>
      <div style={{fontSize:10,color:"#555",marginBottom:8,letterSpacing:1}}>SUMA {label}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>{METRICS.map(m=>(<StatCard key={m.id} label={m.label} icon={m.icon} color={m.color} value={totals[m.id]||0} sub={isMonth?"ten miesiac":"ten tydzien"}/>))}</div>
      {totals.rozmowy>0&&<div style={{background:"#12122a",border:"1px solid #222",borderRadius:12,padding:13,marginBottom:14}}><ConvBar label="Rozmowa → Zaproszenie" value={pct(totals.zaproszenia,totals.rozmowy)} color="#3B9EE8"/><ConvBar label="Zaproszenie → Spotkanie" value={pct(totals.spotkania,totals.zaproszenia)} color="#7B4FE8"/><ConvBar label="Spotkanie → Partner/Klient" value={pct(totals.partnerzy,totals.spotkania)} color="#27AE60"/></div>}
      <div style={{fontSize:10,color:"#555",marginBottom:0,letterSpacing:1}}>AI ANALIZA</div>
      <AICoachPanel memberName="Lider" todayData={totals} history={[]} isAdmin={true} teamData={{total:members.length,active,...totals,members:rows.map(r=>({name:r.name,active:r.activeDays>0,rozmowy:r.rozmowy||0}))}}/>
      <div style={{fontSize:10,color:"#555",margin:"20px 0 9px",letterSpacing:1}}>RANKING PODZESP.</div>
      {teamRows.map((t,i)=><TeamRankRow key={t.name} t={t} i={i} color={color} barMax={teamRows[0]?.score||1}/>)}
      <div style={{fontSize:10,color:"#555",margin:"18px 0 9px",letterSpacing:1}}>RANKING OSOB</div>
      {rows.filter(r=>r.activeDays>0).map((r,i)=><RankingRow key={r.id} r={r} i={i} period={period}/>)}
      {rows.filter(r=>r.activeDays===0).length>0&&<><div style={{fontSize:10,color:"#E74C3C",margin:"14px 0 8px",letterSpacing:1}}>⚠️ BRAK AKTYWNOSCI ({rows.filter(r=>r.activeDays===0).length} osob)</div>{rows.filter(r=>r.activeDays===0).map(r=>(<div key={r.id} style={{background:"#1a0d0d",border:"1px solid #E74C3C22",borderRadius:9,padding:"9px 13px",marginBottom:5,display:"flex",justifyContent:"space-between"}}><span style={{fontWeight:600,fontSize:13,color:"#888"}}>{r.name}</span><span style={{fontSize:10,color:"#E74C3C"}}>0 dni</span></div>))}</>}
    </>);
  };

  return(
    <div style={{minHeight:"100vh",background:"#0d0d1a",color:"#fff",fontFamily:"'Outfit',sans-serif"}}>
      <style>{GS}</style>
      <div style={{background:"linear-gradient(135deg,#12122a,#1a1a3e)",borderBottom:"1px solid #FFB70033",padding:"15px 18px",display:"flex",alignItems:"center",gap:12}}>
        <button onClick={backAction} style={{background:"none",border:"1px solid #333",borderRadius:8,color:"#888",padding:"6px 12px",cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>{backLabel}</button>
        <div style={{flex:1}}>
          <div style={{fontWeight:800,fontSize:17,color:"#FFB700"}}>🎯 Panel Lidera</div>
          <div style={{fontSize:11,color:"#555"}}>{tab==="member"&&selected?selected.name:tab==="teamdetail"&&selectedTeam?`Zespol: ${selectedTeam}`:`${members.length} czlonkow · ${activeToday.length} aktywnych dzis`}</div>
        </div>
      </div>
      {["overview","teams","weekly","monthly"].includes(tab)&&(
        <div style={{display:"flex",background:"#12122a",borderBottom:"1px solid #222"}}>
          {[["overview","🌐 Dziś"],["teams","👥 Podzesp."],["weekly","📅 Tydzień"],["monthly","📆 Miesiąc"]].map(([k,l])=>(
            <button key={k} onClick={()=>handleTab(k)} style={{flex:1,padding:"11px 4px",background:"none",border:"none",borderBottom:tab===k?"2px solid #FFB700":"2px solid transparent",color:tab===k?"#FFB700":"#666",cursor:"pointer",fontSize:10,fontWeight:tab===k?700:400,fontFamily:"inherit",whiteSpace:"nowrap"}}>{l}</button>
          ))}
        </div>
      )}
      {tab==="overview"&&(
        <div style={{padding:"16px 14px",maxWidth:600,margin:"0 auto"}}>
          <div style={{fontSize:10,color:"#555",marginBottom:9,letterSpacing:1}}>ZESPOL DZISIAJ</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>{METRICS.map(m=>(<StatCard key={m.id} label={m.label} icon={m.icon} color={m.color} value={teamToday[m.id]||0} sub={`${activeToday.length} raportow`}/>))}</div>
          {teamToday.rozmowy>0&&<div style={{background:"#12122a",border:"1px solid #222",borderRadius:12,padding:13,marginBottom:14}}><ConvBar label="Rozmowa → Zaproszenie" value={pct(teamToday.zaproszenia,teamToday.rozmowy)} color="#3B9EE8"/><ConvBar label="Zaproszenie → Spotkanie" value={pct(teamToday.spotkania,teamToday.zaproszenia)} color="#7B4FE8"/><ConvBar label="Spotkanie → Partner/Klient" value={pct(teamToday.partnerzy,teamToday.spotkania)} color="#27AE60"/></div>}
          <div style={{fontSize:10,color:"#555",marginBottom:0,letterSpacing:1}}>AI ANALIZA</div>
          <AICoachPanel memberName="Lider" todayData={teamToday} history={[]} isAdmin={true} teamData={teamData}/>
          <div style={{fontSize:10,color:"#555",margin:"20px 0 9px",letterSpacing:1}}>CZLONKOWIE wg ZESPOLOW ({members.length})</div>
          {members.length===0&&<div style={{textAlign:"center",color:"#555",padding:36,background:"#12122a",borderRadius:12}}>Nikt sie jeszcze nie zalogowal.</div>}
          {TEAMS.map(tn=>{
            const tm=members.filter(m=>m.team===tn);
            if(!tm.length)return null;
            const ta=tm.filter(m=>m.lastSeen===today()).length;
            return(<div key={tn} style={{marginBottom:14}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#16162e",border:"1px solid #2a2a4a",borderRadius:10,padding:"9px 14px",marginBottom:6}}>
                <span style={{fontWeight:700,fontSize:13,color:"#FFB700"}}>👥 {tn}</span>
                <span style={{fontSize:10,color:"#555"}}>{tm.length} osob · {ta} aktywnych</span>
              </div>
              {tm.map(m=>{const e=m.lastEntry||{},act=m.lastSeen===today();return(
                <div key={m.id} onClick={()=>selectMember(m)} style={{background:"#12122a",border:`1px solid ${act?"#27AE6033":"#1a1a2e"}`,borderLeft:`3px solid ${act?"#27AE60":"#2a2a3a"}`,borderRadius:10,padding:"10px 13px",marginBottom:5,cursor:"pointer",marginLeft:12}} onMouseEnter={e2=>e2.currentTarget.style.borderColor="#FFB70055"} onMouseLeave={e2=>e2.currentTarget.style.borderColor=act?"#27AE6033":"#1a1a2e"}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div><span style={{fontWeight:700,fontSize:13}}>{m.name}</span><span style={{marginLeft:6,fontSize:10,color:"#555"}}>ID:{m.idNum}</span><span style={{marginLeft:6,fontSize:10,padding:"1px 6px",borderRadius:20,background:act?"#27AE6018":"#33333318",color:act?"#27AE60":"#555"}}>{act?"✅ dzis":m.lastSeen||"brak"}</span></div>
                    <span style={{color:"#444"}}>›</span>
                  </div>
                  <div style={{display:"flex",gap:8}}>{METRICS.map(mt=>(<div key={mt.id} style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:700,color:act?mt.color:"#333"}}>{act?(e[mt.id]||0):"—"}</div><div style={{fontSize:9,color:"#444"}}>{mt.icon}</div></div>))}</div>
                </div>
              );})}
            </div>);
          })}
        </div>
      )}
      {tab==="teams"&&(
        <div style={{padding:"16px 14px",maxWidth:600,margin:"0 auto"}}>
          <div style={{fontSize:10,color:"#555",marginBottom:12,letterSpacing:1}}>PODZESPY — KLIKNIJ ABY ZOBACZYC ANALIZE AI</div>
          {TEAMS.map(tn=>{
            const tm=members.filter(m=>m.team===tn);
            if(!tm.length)return(<div key={tn} style={{background:"#0d0d1a",border:"1px solid #1a1a2e",borderRadius:12,padding:"12px 14px",marginBottom:8,opacity:0.4}}><div style={{fontSize:13,color:"#555"}}>👥 {tn}</div><div style={{fontSize:10,color:"#444",marginTop:2}}>Brak czlonkow jeszcze</div></div>);
            const stats=computeStats(tm);const ap=pct(stats.active,stats.total);const pc=ap>=70?"#27AE60":ap>=40?"#FFB700":"#E74C3C";
            return(<div key={tn} onClick={()=>openTeam(tn)} style={{background:"#12122a",border:"1px solid #222",borderTop:`3px solid ${pc}`,borderRadius:12,padding:"14px",marginBottom:10,cursor:"pointer"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";}} onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div><div style={{fontWeight:800,fontSize:15}}>👥 {tn}</div><div style={{fontSize:10,color:"#555",marginTop:2}}>{stats.total} osob · <span style={{color:pc}}>{stats.active} aktywnych ({ap}%)</span></div></div>
                <div style={{fontSize:11,color:"#FFB700",fontWeight:700}}>Analiza AI →</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:6}}>{METRICS.map(m=>(<div key={m.id} style={{textAlign:"center",background:"#0d0d1a",borderRadius:8,padding:"7px 4px"}}><div style={{fontSize:15,fontWeight:800,color:stats.active>0?m.color:"#333"}}>{stats.active>0?(stats[m.id]||0):"—"}</div><div style={{fontSize:8,color:"#444",marginTop:2}}>{m.icon}</div></div>))}</div>
            </div>);
          })}
        </div>
      )}
      {tab==="weekly"&&<div style={{padding:"16px 14px",maxWidth:640,margin:"0 auto"}}>{periodSection("TYGODNIA","#FFB700","weekly",e=>e.week===weekKey())}</div>}
      {tab==="monthly"&&<div style={{padding:"16px 14px",maxWidth:640,margin:"0 auto"}}>{periodSection("MIESIACA","#a78bfa","monthly",e=>e.date&&e.date.slice(0,7)===monthKey())}</div>}
      {tab==="teamdetail"&&selectedTeam&&(()=>{
        const tm=members.filter(m=>m.team===selectedTeam);
        const stats=computeStats(tm);const ap=pct(stats.active,stats.total);
        return(<div style={{padding:"16px 14px",maxWidth:560,margin:"0 auto"}}>
          <div style={{background:"linear-gradient(135deg,#16162e,#1a1a3a)",border:"1px solid #2a2a4a",borderRadius:12,padding:"14px 16px",marginBottom:14}}>
            <div style={{fontSize:16,fontWeight:800,color:"#FFB700",marginBottom:8}}>👥 {selectedTeam}</div>
            <div style={{display:"flex",justifyContent:"space-around"}}>{[{v:stats.total,l:"CZLONKOW",c:"#fff"},{v:stats.active,l:"AKTYWNYCH DZIS",c:"#27AE60"},{v:stats.total-stats.active,l:"BRAK RAPORTU",c:"#E74C3C"},{v:ap+"%",l:"AKTYWNOSC",c:"#3B9EE8"}].map(({v,l,c})=>(<div key={l} style={{textAlign:"center"}}><div style={{fontSize:22,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:9,color:"#555",marginTop:2}}>{l}</div></div>))}</div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>{METRICS.map(m=>(<StatCard key={m.id} label={m.label} icon={m.icon} color={m.color} value={stats[m.id]||0} sub={`${stats.active} raportow`}/>))}</div>
          <div style={{fontSize:10,color:"#555",marginBottom:0,letterSpacing:1}}>AI ANALIZA ZESPOLU</div>
          <AICoachPanel memberName={selectedTeam} todayData={METRICS.reduce((acc,m)=>{acc[m.id]=stats[m.id]||0;return acc;},{})} history={[]} isAdmin={true} teamData={{total:stats.total,active:stats.active,...METRICS.reduce((acc,m)=>{acc[m.id]=stats[m.id]||0;return acc;},{}),members:tm.map(m=>({name:m.name,active:m.lastSeen===today(),rozmowy:m.lastEntry?.rozmowy||0}))}}/>
          <div style={{fontSize:10,color:"#555",margin:"18px 0 9px",letterSpacing:1}}>CZLONKOWIE ({tm.length})</div>
          {tm.map(m=>{const e=m.lastEntry||{},act=m.lastSeen===today();return(<div key={m.id} onClick={()=>selectMember(m)} style={{background:"#12122a",border:`1px solid ${act?"#27AE6033":"#1a1a2e"}`,borderLeft:`3px solid ${act?"#27AE60":"#2a2a3a"}`,borderRadius:10,padding:"10px 13px",marginBottom:6,cursor:"pointer"}} onMouseEnter={e2=>e2.currentTarget.style.borderColor="#FFB70055"} onMouseLeave={e2=>e2.currentTarget.style.borderColor=act?"#27AE6033":"#1a1a2e"}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div><span style={{fontWeight:700,fontSize:13}}>{m.name}</span><span style={{marginLeft:6,fontSize:10,color:"#555"}}>ID:{m.idNum}</span><span style={{marginLeft:6,fontSize:10,padding:"1px 6px",borderRadius:20,background:act?"#27AE6018":"#33333318",color:act?"#27AE60":"#555"}}>{act?"✅ dzis":m.lastSeen||"brak"}</span></div><span style={{color:"#444"}}>›</span></div><div style={{display:"flex",gap:8}}>{METRICS.map(mt=>(<div key={mt.id} style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:700,color:act?mt.color:"#333"}}>{act?(e[mt.id]||0):"—"}</div><div style={{fontSize:9,color:"#444"}}>{mt.icon}</div></div>))}</div></div>);})}
        </div>);
      })()}
      {tab==="member"&&selected&&(
        <div style={{padding:"16px 14px",maxWidth:540,margin:"0 auto"}}>
          <div style={{background:"#16162e",border:"1px solid #2a2a4a",borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",gap:16,alignItems:"center"}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#555",marginBottom:2}}>ZESPOL</div><div style={{fontSize:12,fontWeight:700,color:"#FFB700"}}>{selected.team||"—"}</div></div>
            <div style={{width:1,height:30,background:"#2a2a4a"}}/>
            <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#555",marginBottom:2}}>NUMER ID</div><div style={{fontSize:12,fontWeight:700,color:"#3B9EE8"}}>{selected.idNum||"—"}</div></div>
            <div style={{width:1,height:30,background:"#2a2a4a"}}/>
            <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#555",marginBottom:2}}>DNI AKTYWNYCH</div><div style={{fontSize:12,fontWeight:700,color:"#27AE60"}}>{memberHistory.length}</div></div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>{METRICS.map(m=>{const total=memberHistory.reduce((s,e)=>s+(e[m.id]||0),0);return <StatCard key={m.id} label={m.label} icon={m.icon} color={m.color} value={total} sub="lacznie"/>;})}</div>
          {memberHistory.length>0&&<><div style={{fontSize:10,color:"#555",marginBottom:0,letterSpacing:1}}>AI COACHING</div><AICoachPanel memberName={selected.name} todayData={memberHistory[memberHistory.length-1]} history={memberHistory}/></>}
          <div style={{fontSize:10,color:"#555",margin:"18px 0 9px",letterSpacing:1}}>HISTORIA ({memberHistory.length} dni)</div>
          {memberHistory.length===0?<div style={{color:"#555",textAlign:"center",padding:28}}>Brak historii</div>
          :[...memberHistory].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,14).map(e=>{
            const score=(e.rozmowy||0)+(e.zaproszenia||0)*2+(e.spotkania||0)*3+(e.partnerzy||0)*10+(e.sety||0)*5;
            const sc=score>=20?"#27AE60":score>=10?"#FFB700":"#E74C3C";
            return(<div key={e.date} style={{background:"#12122a",border:"1px solid #222",borderRadius:10,padding:"11px 13px",marginBottom:7}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}><div style={{fontSize:12,color:"#888"}}>{new Date(e.date+"T12:00:00").toLocaleDateString("pl-PL",{weekday:"short",day:"numeric",month:"short"})}</div><div style={{fontSize:11,color:sc,fontWeight:700}}>Wynik: {score}</div></div><div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:4}}>{METRICS.map(m=>(<div key={m.id} style={{textAlign:"center"}}><div style={{fontSize:13,fontWeight:700,color:m.color}}>{e[m.id]||0}</div><div style={{fontSize:9,color:"#555"}}>{m.icon}</div></div>))}</div></div>);
          })}
        </div>
      )}
    </div>
  );
}

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function LoginScreen({onMember,onAdmin}){
  const [mode,setMode]=useState(null);
  const [name,setName]=useState("");
  const [idNum,setIdNum]=useState("");
  const [team,setTeam]=useState("");
  const [pin,setPin]=useState("");
  const [members,setMembers]=useState([]);
  const [error,setError]=useState("");
  const [newUser,setNewUser]=useState(false);
  const [loginLoading,setLoginLoading]=useState(false);

  useEffect(()=>{loadMembers().then(m=>setMembers(m||[]));},[]);

  const inp={width:"100%",padding:"13px",background:"#12122a",border:"1px solid #333",borderRadius:10,color:"#fff",fontSize:14,marginBottom:9,outline:"none",fontFamily:"inherit"};
  const sel={...inp,appearance:"none",WebkitAppearance:"none",cursor:"pointer"};

  const login=async()=>{
    if(!name.trim()){setError("Wpisz imie i nazwisko");return;}
    if(!idNum.trim()){setError("Wpisz numer ID");return;}
    if(!team){setError("Wybierz swoj zespol");return;}
    setLoginLoading(true);
    const ex=members.find(m=>m.idNum===idNum.trim());
    const member=ex?{...ex,name:name.trim(),team}:{id:Date.now().toString(),name:name.trim(),idNum:idNum.trim(),team,joined:today()};
    await saveMember({...member,lastSeen:member.lastSeen||null,lastEntry:member.lastEntry||null});
    setLoginLoading(false);
    onMember(member);
  };

  const grouped=TEAMS.reduce((acc,t)=>{acc[t]=members.filter(m=>m.team===t);return acc;},{});

  return(
    <div style={{minHeight:"100vh",background:"#0d0d1a",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20,fontFamily:"'Outfit',sans-serif"}}>
      <style>{GS}</style>
      <div style={{textAlign:"center",marginBottom:30}}>
        <div style={{fontSize:42,marginBottom:8}}>📊</div>
        <div style={{fontSize:25,fontWeight:800,color:"#fff",letterSpacing:-0.5}}>Team Tracker</div>
        <div style={{fontSize:11,color:"#555",marginTop:4}}>System monitoringu · Riway</div>
      </div>
      {!mode&&<div style={{width:"100%",maxWidth:310}}>
        <button onClick={()=>setMode("member")} style={{width:"100%",padding:"16px 20px",marginBottom:10,background:"linear-gradient(135deg,#3B9EE8,#7B4FE8)",border:"none",borderRadius:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>👤 Czlonek zespolu</button>
        <button onClick={()=>setMode("admin")} style={{width:"100%",padding:"16px 20px",background:"transparent",border:"1px solid #FFB70055",borderRadius:14,color:"#FFB700",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>🎯 Lider (admin)</button>
      </div>}
      {mode==="member"&&<div style={{width:"100%",maxWidth:360}}>
        {members.length>0&&!newUser&&<>
          <div style={{fontSize:10,color:"#555",marginBottom:8,letterSpacing:1}}>POWRACAJACY — WYBIERZ SIEBIE</div>
          <div style={{maxHeight:280,overflowY:"auto",marginBottom:6}}>
            {TEAMS.filter(t=>grouped[t]?.length>0).map(t=>(<div key={t}>
              <div style={{fontSize:9,color:"#444",letterSpacing:1,padding:"6px 4px 4px",borderBottom:"1px solid #1a1a2e"}}>ZESPOL: {t.toUpperCase()}</div>
              {grouped[t].map(m=>(<button key={m.id} onClick={()=>onMember(m)} style={{width:"100%",padding:"10px 13px",marginBottom:4,background:"#12122a",border:"1px solid #222",borderRadius:9,color:"#fff",fontSize:13,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:9,fontFamily:"inherit"}}>
                <span style={{fontSize:16}}>👤</span>
                <div style={{flex:1}}><div style={{fontWeight:600}}>{m.name}</div><div style={{fontSize:10,color:"#555"}}>ID: {m.idNum}</div></div>
                {m.lastSeen===today()&&<span style={{fontSize:10,color:"#27AE60"}}>✅</span>}
              </button>))}
            </div>))}
          </div>
          <button onClick={()=>setNewUser(true)} style={{background:"none",border:"1px solid #333",borderRadius:9,color:"#888",fontSize:12,cursor:"pointer",width:"100%",padding:"9px",marginBottom:6,fontFamily:"inherit"}}>+ Nowa osoba / inne konto</button>
        </>}
        {(!members.length||newUser)&&<>
          <div style={{fontSize:10,color:"#555",marginBottom:10,letterSpacing:1}}>{newUser?"NOWA REJESTRACJA":"PIERWSZE LOGOWANIE"}</div>
          <div style={{fontSize:10,color:"#888",marginBottom:4}}>Imie i Nazwisko</div>
          <input value={name} onChange={e=>{setName(e.target.value);setError("");}} placeholder="np. Anna Kowalska" style={inp}/>
          <div style={{fontSize:10,color:"#888",marginBottom:4}}>Numer ID</div>
          <input value={idNum} onChange={e=>{setIdNum(e.target.value);setError("");}} placeholder="Twoj numer ID" style={inp}/>
          <div style={{fontSize:10,color:"#888",marginBottom:4}}>Twoj zespol (lider)</div>
          <select value={team} onChange={e=>{setTeam(e.target.value);setError("");}} style={sel}>
            <option value="">— Wybierz swoj zespol —</option>
            {TEAMS.map(t=><option key={t} value={t}>{t}</option>)}
          </select>
          {error&&<div style={{color:"#E74C3C",fontSize:12,marginBottom:8}}>{error}</div>}
          <button onClick={login} disabled={loginLoading} style={{width:"100%",padding:"14px",background:loginLoading?"#333":"linear-gradient(135deg,#3B9EE8,#7B4FE8)",border:"none",borderRadius:10,color:"#fff",fontSize:14,fontWeight:700,cursor:loginLoading?"not-allowed":"pointer",fontFamily:"inherit",marginBottom:6}}>{loginLoading?"Laczenie...":"Wejdz →"}</button>
        </>}
        <button onClick={()=>{setMode(null);setError("");setNewUser(false);setName("");setIdNum("");setTeam("");}} style={{background:"none",border:"none",color:"#444",fontSize:12,cursor:"pointer",width:"100%",padding:"8px",fontFamily:"inherit"}}>← Wróc</button>
      </div>}
      {mode==="admin"&&<div style={{width:"100%",maxWidth:310}}>
        <div style={{fontSize:12,color:"#888",marginBottom:12,textAlign:"center"}}>PIN lidera</div>
        <input type="password" value={pin} onChange={e=>{setPin(e.target.value);setError("");}} placeholder="••••••••" onKeyDown={e=>e.key==="Enter"&&(pin===ADMIN_PIN?onAdmin():(setError("Bledny PIN"),setPin("")))} style={{...inp,color:"#FFB700",fontSize:20,textAlign:"center",letterSpacing:4}}/>
        {error&&<div style={{color:"#E74C3C",fontSize:12,marginBottom:7,textAlign:"center"}}>{error}</div>}
        <button onClick={()=>{if(pin===ADMIN_PIN)onAdmin();else{setError("Bledny PIN");setPin("");}}} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#FFB700,#FF8C00)",border:"none",borderRadius:10,color:"#000",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>Wejdz →</button>
        <div style={{fontSize:10,color:"#333",textAlign:"center",marginTop:5}}>PIN: admin2026</div>
        <button onClick={()=>{setMode(null);setError("");}} style={{background:"none",border:"none",color:"#444",fontSize:12,cursor:"pointer",width:"100%",padding:"9px",marginTop:4,fontFamily:"inherit"}}>← Wróc</button>
      </div>}
    </div>
  );
}

function App(){
  const [view,setView]=useState("login");
  const [member,setMember]=useState(null);
  if(view==="login")  return <LoginScreen onMember={m=>{setMember(m);setView("member");}} onAdmin={()=>setView("admin")}/>;
  if(view==="member") return <MemberView memberId={member.id} memberName={member.name} memberTeam={member.team} memberIdNum={member.idNum} memberJoined={member.joined} onBack={()=>setView("login")}/>;
  if(view==="admin")  return <AdminView onBack={()=>setView("login")}/>;
  return <LoginScreen onMember={m=>{setMember(m);setView("member");}} onAdmin={()=>setView("admin")}/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
